name: Astro Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *" # 毎時7分(GitHub側が混みやすい毎時00分は避ける)

permissions:
  contents: write

concurrency:
  group: astro-daily-digest
  cancel-in-progress: false # 前回実行が長引いた場合は待たせて直列化する(git pushの競合防止)

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_GITHUB_ISSUE: "false"
        run: python daily_digest.py

      - name: Commit site data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update astro digest feed"
          file_pattern: docs/data/*.md docs/data/index.json
