<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root{
    --bg:#101426;          /* 深宇宙の紺 */
    --surface:#1a2038;     /* カード面 */
    --surface-2:#232a48;   /* 折りたたみ内 */
    --ink:#e8eaf2;         /* 月光色の本文 */
    --ink-dim:#9aa3c0;     /* 補助テキスト */
    --gold:#f5b841;        /* X線疑似カラーの金 */
    --cyan:#6fd3e0;        /* リンク・イベント */
    --line:#2c3352;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP",sans-serif;font-size:15px;line-height:1.75;
  }
  header{
    position:sticky;top:0;z-index:5;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  header .wrap{display:flex;align-items:baseline;gap:10px;padding-top:14px;padding-bottom:14px}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em}
  h1 .scope{color:var(--gold)}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim)}

  main{padding:20px 0 80px}
  .calendar{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin:0 16px 18px;
  }
  @media(min-width:672px){.calendar{margin-left:auto;margin-right:auto;max-width:640px}}
  .calendar-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .calendar-toggle{
    border:1px solid var(--gold);background:rgba(245,184,65,.08);color:var(--gold);
    border-radius:6px;min-height:32px;padding:0 10px;cursor:pointer;
    font-family:"IBM Plex Mono",monospace;font-size:13px;
  }
  .calendar-toggle::after{content:"−";margin-left:8px;color:var(--ink-dim)}
  .calendar.is-collapsed .calendar-toggle::after{content:"+"}
  .calendar-title{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink-dim)}
  .calendar-controls{display:flex;align-items:center;gap:6px}
  @media(max-width:420px){
    .calendar-head{align-items:flex-start;flex-direction:column}
    .calendar-controls{width:100%;justify-content:space-between}
  }
  .calendar button{
    border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
    border-radius:6px;min-height:32px;cursor:pointer;
    font-family:"IBM Plex Mono",monospace;font-size:12px;
  }
  .calendar button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .calendar-nav{width:32px;padding:0}
  .calendar-all{padding:0 10px;color:var(--gold)}
  .calendar-weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
  .calendar-weekdays{margin-bottom:4px}
  .calendar-weekdays span{
    text-align:center;color:var(--ink-dim);font-family:"IBM Plex Mono",monospace;
    font-size:10px;
  }
  .calendar-day{
    aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);font-family:"IBM Plex Mono",monospace;font-size:12px;
  }
  .calendar-day.has-data{
    color:var(--cyan);background:rgba(111,211,224,.08);border-color:rgba(111,211,224,.45);
  }
  .calendar-day.is-selected{
    color:var(--gold);background:rgba(245,184,65,.14);border-color:var(--gold);
  }
  .calendar-day:disabled{cursor:default;opacity:.42}
  .calendar.is-collapsed .calendar-body{display:none}
  .calendar.is-collapsed .calendar-head{margin-bottom:0}
  .feed-switcher{
    display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;
    margin:0 16px 18px;
  }
  @media(min-width:672px){.feed-switcher{margin-left:auto;margin-right:auto;max-width:640px}}
  .feed-tab{
    min-height:38px;border:1px solid var(--line);border-radius:8px;
    background:var(--surface);color:var(--ink-dim);cursor:pointer;
    font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500;
  }
  .feed-tab.is-active{
    color:var(--gold);border-color:var(--gold);
    background:rgba(245,184,65,.08);
  }
  .feed-tab:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  article.day{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 8px;margin:0 16px 22px;
    scroll-margin-top:82px;
  }
  article.day.is-jump-target{border-color:var(--gold);box-shadow:0 0 0 1px rgba(245,184,65,.28)}
  @media(min-width:672px){article.day{margin-left:auto;margin-right:auto;max-width:640px}}
  .stamp{
    display:flex;align-items:center;gap:10px;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-dim);
    padding-bottom:10px;border-bottom:1px dashed var(--line);margin-bottom:6px;
  }
  .stamp .date{color:var(--gold);font-weight:500;font-size:13px}
  .stamp::before{content:"00:00 JST";border:1px solid var(--gold);color:var(--gold);
    border-radius:4px;padding:1px 6px;font-size:10px;letter-spacing:.08em}

  /* ダイジェスト本文(markdownから生成) */
  .body .update-time{
    display:flex;align-items:center;gap:8px;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--gold);
    letter-spacing:.04em;
    margin:0 0 4px;padding:0 0 12px;
    position:relative;
  }
  .body .update-time::before{
    content:"";width:10px;height:10px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 0 4px rgba(245,184,65,.12);
    margin-left:-18px;flex:0 0 auto;
  }
  .update-block{
    position:relative;margin:18px 0 26px;padding-left:18px;
  }
  .update-block::before{
    content:"";position:absolute;left:4px;top:6px;bottom:-18px;
    width:1px;background:var(--line);
  }
  .update-block:last-child::before{bottom:8px}
  .body h2{font-size:15px;margin:20px 0 8px;color:var(--ink);
    border-left:3px solid var(--gold);padding-left:10px}
  .body h3{font-size:14.5px;margin:18px 0 4px;line-height:1.5}
  .body h3 a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  .body h3 a:hover{color:var(--cyan);border-color:var(--cyan)}
  .body a{color:var(--cyan)}
  .body ul{margin:4px 0;padding-left:18px}
  .body li{margin:2px 0}
  .body strong{color:var(--gold);font-weight:700}
  .body .katex{color:var(--ink);font-size:1em}
  .body .katex-display{overflow-x:auto;overflow-y:hidden;padding:4px 0}
  .body hr{border:none;border-top:1px dashed var(--line);margin:18px 0}
  .digest-section{
    margin:10px 0 16px;padding:0;
  }
  .digest-section > h2{
    display:inline-flex;align-items:center;
    margin:8px 0 8px;padding:2px 8px;border:1px solid var(--line);
    border-radius:999px;background:rgba(255,255,255,.04);
    font-family:"IBM Plex Mono",monospace;font-size:11px;line-height:1.5;
    color:var(--ink-dim);
  }
  .digest-section.gcn > h2{border-color:rgba(255,106,106,.42);color:#ff9a9a}
  .digest-section.atel > h2{border-color:rgba(111,211,224,.52);color:var(--cyan)}
  .digest-section.tns > h2{border-color:rgba(194,148,255,.52);color:#c294ff}
  .digest-section.arxiv > h2{border-color:rgba(245,184,65,.5);color:var(--gold)}
  .digest-section.mission > h2{border-color:rgba(120,214,154,.5);color:#78d69a}
  .digest-section.press > h2{border-color:rgba(120,214,154,.5);color:#78d69a}
  .digest-item{
    position:relative;border:1px solid rgba(255,255,255,.08);border-radius:10px;
    padding:12px 14px;margin:10px 0 12px;background:rgba(16,20,38,.42);
  }
  .digest-item::before{
    content:"";position:absolute;left:-20px;top:18px;
    width:7px;height:7px;border-radius:50%;background:var(--cyan);
    border:2px solid var(--bg);
  }
  .digest-section.gcn .digest-item{border-left:3px solid #ff7676}
  .digest-section.gcn .digest-item::before{background:#ff7676}
  .digest-section.atel .digest-item{border-left:3px solid var(--cyan)}
  .digest-section.atel .digest-item::before{background:var(--cyan)}
  .digest-section.tns .digest-item{border-left:3px solid #c294ff}
  .digest-section.tns .digest-item::before{background:#c294ff}
  .digest-section.arxiv .digest-item{border-left:3px solid var(--gold)}
  .digest-section.arxiv .digest-item::before{background:var(--gold)}
  .digest-section.mission .digest-item{border-left:3px solid #78d69a}
  .digest-section.mission .digest-item::before{background:#78d69a}
  .digest-section.press .digest-item{border-left:3px solid #78d69a}
  .digest-section.press .digest-item::before{background:#78d69a}
  .digest-item h3{margin-top:0}
  .source-line{
    font-family:"IBM Plex Mono",monospace;font-size:12px;line-height:1.55;
    color:var(--ink-dim);background:rgba(0,0,0,.16);
    border-radius:6px;padding:7px 9px;margin:7px 0 9px;
  }
  .source-line a{font-family:"Noto Sans JP",sans-serif}
  .published-time{
    display:inline-flex;align-items:center;gap:6px;
    margin:0 0 9px;padding:2px 8px;border:1px solid rgba(245,184,65,.44);
    border-radius:999px;background:rgba(245,184,65,.08);color:var(--gold);
    font-family:"IBM Plex Mono",monospace;font-size:11px;line-height:1.6;
  }
  .section-note{
    display:none;
  }
  .detail-toggle{margin:8px 0 14px}
  .detail-toggle button{
    min-height:32px;border:1px solid var(--line);border-radius:6px;
    background:var(--surface-2);color:var(--cyan);
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;cursor:pointer;
    padding:6px 10px;
  }
  .detail-toggle button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .detail-panel{
    background:var(--surface-2);border-radius:8px;margin-top:6px;
    padding:8px 12px;font-size:13.5px;color:var(--ink-dim);
  }
  @media(min-width:980px){
    .wrap{max-width:1120px}
    header .wrap{align-items:center}
    .calendar{max-width:1120px}
    .feed-switcher{max-width:760px}
    .calendar-grid,.calendar-weekdays{max-width:520px}
    article.day{max-width:1120px;padding:22px 24px 12px}
    .body{display:block;max-width:760px;margin:0 auto}
    .update-block > hr{display:none}
    .digest-section{margin:0}
  }

  .more{display:block;margin:8px auto 0;padding:10px 26px;
    background:none;border:1px solid var(--gold);border-radius:999px;
    color:var(--gold);font-family:"IBM Plex Mono",monospace;font-size:13px;cursor:pointer}
  .more:hover{background:color-mix(in srgb,var(--gold) 12%,transparent)}
  .more:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .note{text-align:center;color:var(--ink-dim);font-size:13px;padding:30px 16px}
  @media(prefers-reduced-motion:no-preference){
    article.day{animation:rise .35s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>Astro Daily <span class="scope">Digest</span></h1>
  <span class="sub">X-ray / transients / instruments</span>
</div></header>

<main class="wrap">
  <section class="calendar is-collapsed" aria-label="アーカイブカレンダー">
    <div class="calendar-head">
      <button class="calendar-toggle" id="calendarToggle" type="button" aria-expanded="false">ARCHIVE</button>
      <div class="calendar-controls">
        <span class="calendar-title" id="calendarTitle">ARCHIVE</span>
        <button class="calendar-nav" id="prevMonth" type="button" aria-label="前の月">‹</button>
        <button class="calendar-nav" id="nextMonth" type="button" aria-label="次の月">›</button>
        <button class="calendar-all" id="showAll" type="button">全期間</button>
      </div>
    </div>
    <div class="calendar-body" id="calendarBody">
      <div class="calendar-weekdays" aria-hidden="true">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>
  <nav class="feed-switcher" aria-label="表示する情報">
    <button class="feed-tab is-active" type="button" data-feed-filter="transients">新天体</button>
    <button class="feed-tab" type="button" data-feed-filter="press">プレス</button>
    <button class="feed-tab" type="button" data-feed-filter="papers">論文</button>
  </nav>
  <section id="feed" aria-live="polite">
    <p class="note" id="status">読み込み中…</p>
  </section>
</main>

<script>
const PAGE = 7; // 一度に読み込む日数
let dates = [], cursor = 0, selectedDate = null, calendarYear = null, calendarMonth = null, activeFeed = 'transients';
const FEED_SECTIONS = {
  transients: ['gcn', 'atel', 'tns'],
  press: ['press', 'mission'],
  papers: ['arxiv']
};

async function loadIndex(){
  const st = document.getElementById('status');
  try{
    const res = await fetch('data/index.json', {cache:'no-store'});
    dates = await res.json();
    if(!dates.length){ st.textContent = 'まだ投稿がありません。最初のダイジェストは明朝届きます。'; return; }
    const latest = parseDateKey(dates[0]);
    calendarYear = latest.getUTCFullYear();
    calendarMonth = latest.getUTCMonth();
    renderCalendar();
    st.remove();
    renderDaily();
  }catch(e){
    st.textContent = 'index.json が読み込めませんでした。Actions が一度実行されるとフィードが生成されます。';
  }
}

function parseDateKey(date){
  const [y, m, d] = date.split('-').map(Number);
  return new Date(Date.UTC(y, m - 1, d));
}

function formatDateKey(date){
  return [
    date.getUTCFullYear(),
    String(date.getUTCMonth() + 1).padStart(2, '0'),
    String(date.getUTCDate()).padStart(2, '0')
  ].join('-');
}

function dateArticleId(date){
  return `day-${date}`;
}

async function fetchDigest(date){
  const res = await fetch(`data/${date}.md`, {cache:'no-store'});
  if(!res.ok) throw new Error(date);
  return res.text();
}

function renderCalendar(){
  const available = new Set(dates);
  const title = document.getElementById('calendarTitle');
  const grid = document.getElementById('calendarGrid');
  const monthStart = new Date(Date.UTC(calendarYear, calendarMonth, 1));
  const monthEnd = new Date(Date.UTC(calendarYear, calendarMonth + 1, 0));
  title.textContent = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}`;
  grid.innerHTML = '';

  for(let i = 0; i < monthStart.getUTCDay(); i++){
    const empty = document.createElement('span');
    empty.className = 'calendar-day';
    grid.appendChild(empty);
  }

  for(let day = 1; day <= monthEnd.getUTCDate(); day++){
    const current = new Date(Date.UTC(calendarYear, calendarMonth, day));
    const key = formatDateKey(current);
    const hasData = available.has(key);
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `calendar-day${hasData ? ' has-data' : ''}${selectedDate === key ? ' is-selected' : ''}`;
    button.textContent = String(day);
    button.disabled = !hasData;
    button.setAttribute('aria-label', hasData ? `${key} へジャンプ` : `${key} はデータなし`);
    if(hasData) button.addEventListener('click', () => jumpToDate(key));
    grid.appendChild(button);
  }
}

function clearFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  return feed;
}

function renderMath(root){
  if(!window.renderMathInElement) return;
  renderMathInElement(root, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ],
    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    throwOnError: false
  });
}

function enhanceDigest(body){
  for(const h2 of [...body.querySelectorAll('h2')]){
    const text = h2.textContent;
    const section = document.createElement('section');
    section.className = 'digest-section';
    if(text.includes('GCN')) section.classList.add('gcn');
    else if(text.includes('ATel')) section.classList.add('atel');
    else if(text.includes('TNS')) section.classList.add('tns');
    else if(text.includes('ミッション') || text.includes('観測所')) section.classList.add('mission');
    else if(text.includes('国内')) section.classList.add('press');
    else if(text.includes('arXiv')) section.classList.add('arxiv');
    h2.parentNode.insertBefore(section, h2);

    let node = h2;
    while(node){
      const next = node.nextSibling;
      if(node !== h2 && node.nodeType === Node.ELEMENT_NODE && node.tagName === 'H2') break;
      section.appendChild(node);
      node = next;
    }

    const note = document.createElement('div');
    note.className = 'section-note';
    if(section.classList.contains('gcn')) note.textContent = 'GCN Circulars / event grouped';
    else if(section.classList.contains('atel')) note.textContent = 'Astronomer’s Telegram / post based';
    else if(section.classList.contains('tns')) note.textContent = 'Transient Name Server / object list';
    else if(section.classList.contains('mission')) note.textContent = 'Mission and observatory news / keyword filtered';
    else if(section.classList.contains('press')) note.textContent = 'Japan press releases / keyword filtered';
    else if(section.classList.contains('arxiv')) note.textContent = 'arXiv papers / abstract first';
    if(note.textContent) h2.insertAdjacentElement('afterend', note);
  }

  for(const section of body.querySelectorAll('.digest-section')){
    for(const h3 of [...section.querySelectorAll('h3')]){
      const item = document.createElement('section');
      item.className = 'digest-item';
      h3.parentNode.insertBefore(item, h3);
      let node = h3;
      while(node){
        const next = node.nextSibling;
        if(node !== h3 && node.nodeType === Node.ELEMENT_NODE && ['H2','H3','HR'].includes(node.tagName)) break;
        item.appendChild(node);
        node = next;
      }
    }
  }

  for(const item of body.querySelectorAll('.digest-item')){
    for(const li of [...item.querySelectorAll('li')]){
      const text = li.textContent.trim();
      const match = text.match(/^(?:日付|掲載|投稿日|公開日):\s*(.+)$/);
      if(!match) continue;
      const badge = document.createElement('div');
      badge.className = 'published-time';
      badge.textContent = `🕒 ${match[1]} 掲載`;
      li.replaceWith(badge);
      break;
    }
  }

  for(const p of body.querySelectorAll('p')){
    if(p.textContent.trim().startsWith('原文:')) p.classList.add('source-line');
  }
}

function normalizeUpdateMarkers(body){
  for(const p of [...body.querySelectorAll('p')]){
    const text = p.textContent.trim();
    if(text.startsWith('🕒') && text.includes('更新')){
      const div = document.createElement('div');
      div.className = 'update-time';
      div.textContent = text;
      p.replaceWith(div);
    }
  }
}

function groupUpdateBlocks(body){
  const children = [...body.childNodes];
  let block = null;
  const ensureBlock = () => {
    if(!block){
      block = document.createElement('section');
      block.className = 'update-block';
      body.appendChild(block);
    }
    return block;
  };

  body.innerHTML = '';
  for(const child of children){
    if(child.nodeType === Node.TEXT_NODE && !child.textContent.trim()) continue;
    if(child.nodeType === Node.ELEMENT_NODE && child.classList.contains('update-time')){
      block = document.createElement('section');
      block.className = 'update-block';
      body.appendChild(block);
      block.appendChild(child);
      continue;
    }
    ensureBlock().appendChild(child);
  }
}

function renderMarkdown(md){
  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = marked.parse(md);
  normalizeUpdateMarkers(body);
  enhanceDigest(body);
  groupUpdateBlocks(body);
  renderMath(body);
  return body;
}

function applyFeedFilter(){
  const allowed = FEED_SECTIONS[activeFeed] || FEED_SECTIONS.transients;
  document.querySelectorAll('.feed-tab').forEach(button => {
    const active = button.dataset.feedFilter === activeFeed;
    button.classList.toggle('is-active', active);
    button.setAttribute('aria-pressed', String(active));
  });

  for(const article of document.querySelectorAll('article.day')){
    let hasVisibleBlock = false;
    for(const block of article.querySelectorAll('.update-block')){
      let hasVisibleSection = false;
      for(const section of block.querySelectorAll('.digest-section')){
        const visible = allowed.some(name => section.classList.contains(name));
        section.hidden = !visible;
        if(visible) hasVisibleSection = true;
      }
      block.hidden = !hasVisibleSection;
      if(hasVisibleSection) hasVisibleBlock = true;
    }
    let empty = article.querySelector('.feed-empty');
    if(!hasVisibleBlock){
      if(!empty){
        empty = document.createElement('p');
        empty.className = 'note feed-empty';
        article.appendChild(empty);
      }
      empty.textContent = 'このカテゴリの更新はまだありません。';
    }else if(empty){
      empty.remove();
    }
  }
}

async function renderDaily(){
  selectedDate = null;
  cursor = 0;
  clearFeed();
  renderCalendar();
  await loadMore();
}

async function ensureDateLoaded(date){
  while(!document.getElementById(dateArticleId(date)) && cursor < dates.length){
    await loadMore();
  }
}

async function jumpToDate(date){
  selectedDate = date;
  renderCalendar();
  await ensureDateLoaded(date);
  const target = document.getElementById(dateArticleId(date));
  if(target){
    document.querySelectorAll('article.day.is-jump-target').forEach(node => {
      node.classList.remove('is-jump-target');
    });
    target.classList.add('is-jump-target');
    target.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

async function loadMore(){
  const feed = document.getElementById('feed');
  const slice = dates.slice(cursor, cursor + PAGE);
  cursor += slice.length;
  for(const d of slice){
    try{
      const md = await fetchDigest(d);
      const art = document.createElement('article');
      art.className = 'day';
      art.id = dateArticleId(d);
      art.innerHTML = `<div class="stamp"><span class="date">${d}</span></div>`;
      art.appendChild(renderMarkdown(md));
      feed.appendChild(art);
      applyFeedFilter();
    }catch(e){ /* 個別の欠損はスキップ */ }
  }
  const old = document.getElementById('more'); if(old) old.remove();
  if(cursor < dates.length){
    const b = document.createElement('button');
    b.id = 'more'; b.className = 'more'; b.textContent = 'さらに過去を読み込む';
    b.onclick = loadMore;
    feed.appendChild(b);
  }
}

loadIndex();
document.getElementById('prevMonth').addEventListener('click', () => {
  if(calendarYear === null) return;
  calendarMonth -= 1;
  if(calendarMonth < 0){ calendarMonth = 11; calendarYear -= 1; }
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if(calendarYear === null) return;
  calendarMonth += 1;
  if(calendarMonth > 11){ calendarMonth = 0; calendarYear += 1; }
  renderCalendar();
});
document.getElementById('showAll').addEventListener('click', renderDaily);
document.getElementById('calendarToggle').addEventListener('click', () => {
  const calendar = document.querySelector('.calendar');
  const collapsed = calendar.classList.toggle('is-collapsed');
  document.getElementById('calendarToggle').setAttribute('aria-expanded', String(!collapsed));
  if(!collapsed) renderCalendar();
});
document.querySelectorAll('.feed-tab').forEach(button => {
  button.addEventListener('click', () => {
    activeFeed = button.dataset.feedFilter;
    applyFeedFilter();
  });
});
