<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  :root{
    --bg:#101426;          /* 深宇宙の紺 */
    --surface:#1a2038;     /* カード面 */
    --surface-2:#232a48;   /* 折りたたみ内 */
    --ink:#e8eaf2;         /* 月光色の本文 */
    --ink-dim:#9aa3c0;     /* 補助テキスト */
    --gold:#f5b841;        /* X線疑似カラーの金 */
    --cyan:#6fd3e0;        /* リンク・イベント */
    --line:#2c3352;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP",sans-serif;font-size:15px;line-height:1.75;
  }
  header{
    position:sticky;top:0;z-index:5;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  header .wrap{display:flex;align-items:baseline;gap:10px;padding-top:14px;padding-bottom:14px}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em}
  h1 .scope{color:var(--gold)}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim)}

  main{padding:20px 0 80px}
  .views{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    margin:0 16px 16px;
  }
  @media(min-width:672px){.views{margin-left:auto;margin-right:auto;max-width:640px}}
  .view{
    min-height:40px;border:1px solid var(--line);border-radius:8px;
    background:var(--surface);color:var(--ink-dim);
    font-family:"Noto Sans JP",sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;
  }
  .view[aria-selected="true"]{
    border-color:var(--gold);color:var(--gold);
    background:color-mix(in srgb,var(--gold) 10%,var(--surface));
  }
  .view:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  article.day{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 8px;margin:0 16px 22px;
  }
  @media(min-width:672px){article.day{margin-left:auto;margin-right:auto;max-width:640px}}
  .stamp{
    display:flex;align-items:center;gap:10px;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-dim);
    padding-bottom:10px;border-bottom:1px dashed var(--line);margin-bottom:6px;
  }
  .stamp .date{color:var(--gold);font-weight:500;font-size:13px}
  .stamp::before{content:"OBS LOG";border:1px solid var(--gold);color:var(--gold);
    border-radius:4px;padding:1px 6px;font-size:10px;letter-spacing:.08em}
  .stamp.week::before{content:"7 DAYS"}
  .week-section{border-top:1px dashed var(--line);margin-top:14px;padding-top:12px}
  .week-section:first-child{border-top:0;margin-top:0;padding-top:0}
  .week-date{
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--gold);
    margin:4px 0 8px;
  }

  /* ダイジェスト本文(markdownから生成) */
  .body h2{font-size:15px;margin:20px 0 8px;color:var(--ink);
    border-left:3px solid var(--gold);padding-left:10px}
  .body h3{font-size:14.5px;margin:18px 0 4px;line-height:1.5}
  .body h3 a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  .body h3 a:hover{color:var(--cyan);border-color:var(--cyan)}
  .body a{color:var(--cyan)}
  .body ul{margin:4px 0;padding-left:18px}
  .body li{margin:2px 0}
  .body strong{color:var(--gold);font-weight:700}
  .body hr{border:none;border-top:1px dashed var(--line);margin:18px 0}
  .body details{
    background:var(--surface-2);border-radius:8px;margin:8px 0 14px;
    padding:8px 12px;font-size:13.5px;color:var(--ink-dim);
  }
  .body summary{cursor:pointer;font-family:"IBM Plex Mono",monospace;
    font-size:11.5px;color:var(--cyan);user-select:none}
  .body summary:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .more{display:block;margin:8px auto 0;padding:10px 26px;
    background:none;border:1px solid var(--gold);border-radius:999px;
    color:var(--gold);font-family:"IBM Plex Mono",monospace;font-size:13px;cursor:pointer}
  .more:hover{background:color-mix(in srgb,var(--gold) 12%,transparent)}
  .more:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .note{text-align:center;color:var(--ink-dim);font-size:13px;padding:30px 16px}
  @media(prefers-reduced-motion:no-preference){
    article.day{animation:rise .35s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>Astro Daily <span class="scope">Digest</span></h1>
  <span class="sub">X-ray / transients / instruments</span>
</div></header>

<main class="wrap">
  <div class="views" role="tablist" aria-label="表示切り替え">
    <button class="view" id="dailyTab" type="button" role="tab" aria-selected="true">日別</button>
    <button class="view" id="weekTab" type="button" role="tab" aria-selected="false">1週間</button>
  </div>
  <section id="feed" aria-live="polite">
    <p class="note" id="status">読み込み中…</p>
  </section>
</main>

<script>
const PAGE = 7; // 一度に読み込む日数
let dates = [], cursor = 0, mode = 'daily';

async function loadIndex(){
  const st = document.getElementById('status');
  try{
    const res = await fetch('data/index.json', {cache:'no-store'});
    dates = await res.json();
    if(!dates.length){ st.textContent = 'まだ投稿がありません。最初のダイジェストは明朝届きます。'; return; }
    st.remove();
    renderDaily();
  }catch(e){
    st.textContent = 'index.json が読み込めませんでした。Actions が一度実行されるとフィードが生成されます。';
  }
}

async function fetchDigest(date){
  const res = await fetch(`data/${date}.md`, {cache:'no-store'});
  if(!res.ok) throw new Error(date);
  return res.text();
}

function setMode(next){
  mode = next;
  document.getElementById('dailyTab').setAttribute('aria-selected', String(mode === 'daily'));
  document.getElementById('weekTab').setAttribute('aria-selected', String(mode === 'week'));
  if(mode === 'daily') renderDaily();
  else renderWeek();
}

function clearFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  return feed;
}

async function renderDaily(){
  cursor = 0;
  clearFeed();
  await loadMore();
}

async function loadMore(){
  const feed = document.getElementById('feed');
  const slice = dates.slice(cursor, cursor + PAGE);
  cursor += slice.length;
  for(const d of slice){
    try{
      const md = await fetchDigest(d);
      const art = document.createElement('article');
      art.className = 'day';
      art.innerHTML = `<div class="stamp"><span class="date">${d}</span></div>
                       <div class="body">${marked.parse(md)}</div>`;
      feed.appendChild(art);
    }catch(e){ /* 個別の欠損はスキップ */ }
  }
  const old = document.getElementById('more'); if(old) old.remove();
  if(cursor < dates.length){
    const b = document.createElement('button');
    b.id = 'more'; b.className = 'more'; b.textContent = 'さらに過去を読み込む';
    b.onclick = loadMore;
    feed.appendChild(b);
  }
}

async function renderWeek(){
  const feed = clearFeed();
  const week = dates.slice(0, 7);
  const art = document.createElement('article');
  art.className = 'day';
  art.innerHTML = `<div class="stamp week"><span class="date">${week[week.length - 1]} - ${week[0]}</span></div>
                   <div class="body" id="weekBody"></div>`;
  feed.appendChild(art);

  const body = document.getElementById('weekBody');
  for(const d of week){
    try{
      const md = await fetchDigest(d);
      const section = document.createElement('section');
      section.className = 'week-section';
      section.innerHTML = `<div class="week-date">${d}</div>${marked.parse(md)}`;
      body.appendChild(section);
    }catch(e){ /* 個別の欠損はスキップ */ }
  }
}

document.getElementById('dailyTab').addEventListener('click', () => setMode('daily'));
document.getElementById('weekTab').addEventListener('click', () => setMode('week'));
loadIndex();
</script>
</body>
</html>
