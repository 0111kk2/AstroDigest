<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root{
    --bg:#101426;          /* 深宇宙の紺 */
    --surface:#1a2038;     /* カード面 */
    --surface-2:#232a48;   /* 折りたたみ内 */
    --ink:#e8eaf2;         /* 月光色の本文 */
    --ink-dim:#9aa3c0;     /* 補助テキスト */
    --gold:#f5b841;        /* X線疑似カラーの金 */
    --cyan:#6fd3e0;        /* リンク・イベント */
    --line:#2c3352;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP",sans-serif;font-size:15px;line-height:1.75;
  }
  header{
    position:sticky;top:0;z-index:5;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  header .wrap{display:flex;align-items:baseline;gap:10px;padding-top:14px;padding-bottom:14px}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em}
  h1 .scope{color:var(--gold)}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim)}

  main{padding:20px 0 80px}
  .views{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    margin:0 16px 16px;
  }
  @media(min-width:672px){.views{margin-left:auto;margin-right:auto;max-width:640px}}
  .view{
    min-height:40px;border:1px solid var(--line);border-radius:8px;
    background:var(--surface);color:var(--ink-dim);
    font-family:"Noto Sans JP",sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;
  }
  .view[aria-selected="true"]{
    border-color:var(--gold);color:var(--gold);
    background:color-mix(in srgb,var(--gold) 10%,var(--surface));
  }
  .view:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  article.day{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 8px;margin:0 16px 22px;
  }
  @media(min-width:672px){article.day{margin-left:auto;margin-right:auto;max-width:640px}}
  .stamp{
    display:flex;align-items:center;gap:10px;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-dim);
    padding-bottom:10px;border-bottom:1px dashed var(--line);margin-bottom:6px;
  }
  .stamp .date{color:var(--gold);font-weight:500;font-size:13px}
  .stamp::before{content:"OBS LOG";border:1px solid var(--gold);color:var(--gold);
    border-radius:4px;padding:1px 6px;font-size:10px;letter-spacing:.08em}
  .stamp.week::before{content:"7 DAYS"}
  .week-section{border-top:1px dashed var(--line);margin-top:14px;padding-top:12px}
  .week-section:first-child{border-top:0;margin-top:0;padding-top:0}
  .week-date{
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--gold);
    margin:4px 0 8px;
  }

  /* ダイジェスト本文(markdownから生成) */
  .body h2{font-size:15px;margin:20px 0 8px;color:var(--ink);
    border-left:3px solid var(--gold);padding-left:10px}
  .body h3{font-size:14.5px;margin:18px 0 4px;line-height:1.5}
  .body h3 a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  .body h3 a:hover{color:var(--cyan);border-color:var(--cyan)}
  .body a{color:var(--cyan)}
  .body ul{margin:4px 0;padding-left:18px}
  .body li{margin:2px 0}
  .body strong{color:var(--gold);font-weight:700}
  .body .katex{color:var(--ink);font-size:1em}
  .body .katex-display{overflow-x:auto;overflow-y:hidden;padding:4px 0}
  .body hr{border:none;border-top:1px dashed var(--line);margin:18px 0}
  .body details{
    background:var(--surface-2);border-radius:8px;margin:8px 0 14px;
    padding:8px 12px;font-size:13.5px;color:var(--ink-dim);
  }
  .body summary{cursor:pointer;font-family:"IBM Plex Mono",monospace;
    font-size:11.5px;color:var(--cyan);user-select:none}
  .body summary:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .digest-section{
    border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin:14px 0;background:rgba(255,255,255,.015);
  }
  .digest-section > h2{margin-top:0}
  .digest-section.gcn{border-color:rgba(255,106,106,.36);background:rgba(255,106,106,.045)}
  .digest-section.gcn > h2{border-color:#ff7676}
  .digest-section.atel{border-color:rgba(111,211,224,.38);background:rgba(111,211,224,.045)}
  .digest-section.atel > h2{border-color:var(--cyan)}
  .digest-section.arxiv{border-color:rgba(245,184,65,.32);background:rgba(245,184,65,.035)}
  .digest-section.press{border-color:rgba(120,214,154,.36);background:rgba(120,214,154,.045)}
  .digest-section.press > h2{border-color:#78d69a}
  .digest-item{
    border:1px solid rgba(255,255,255,.08);border-radius:8px;
    padding:10px 12px;margin:10px 0;background:rgba(16,20,38,.38);
  }
  .digest-section.gcn .digest-item{border-left:3px solid #ff7676}
  .digest-section.atel .digest-item{border-left:3px solid var(--cyan)}
  .digest-section.arxiv .digest-item{border-left:3px solid var(--gold)}
  .digest-section.press .digest-item{border-left:3px solid #78d69a}
  .digest-item h3{margin-top:0}
  .source-line{
    font-family:"IBM Plex Mono",monospace;font-size:12px;line-height:1.55;
    color:var(--ink-dim);background:rgba(0,0,0,.16);
    border-radius:6px;padding:7px 9px;margin:7px 0 9px;
  }
  .source-line a{font-family:"Noto Sans JP",sans-serif}
  .section-note{
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim);
    margin:-2px 0 8px;text-transform:uppercase;letter-spacing:.04em;
  }
  @media(min-width:980px){
    .wrap{max-width:1120px}
    header .wrap{align-items:center}
    .views{max-width:1120px;grid-template-columns:180px 180px;margin-bottom:18px}
    article.day{max-width:1120px;padding:22px 24px 12px}
    .body{
      display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:16px;align-items:start;
    }
    .body > hr{display:none}
    .digest-section{margin:0}
    .digest-section.arxiv{grid-column:1 / -1}
    .digest-section.arxiv{
      display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:12px 14px;
    }
    .digest-section.arxiv > h2,
    .digest-section.arxiv > .section-note,
    .digest-section.arxiv > p,
    .digest-section.arxiv > hr{grid-column:1 / -1}
    .digest-section.arxiv > .digest-item{margin:0}
    .week-section .body{display:block}
    .week-section .digest-section{margin:14px 0}
  }

  .more{display:block;margin:8px auto 0;padding:10px 26px;
    background:none;border:1px solid var(--gold);border-radius:999px;
    color:var(--gold);font-family:"IBM Plex Mono",monospace;font-size:13px;cursor:pointer}
  .more:hover{background:color-mix(in srgb,var(--gold) 12%,transparent)}
  .more:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .note{text-align:center;color:var(--ink-dim);font-size:13px;padding:30px 16px}
  @media(prefers-reduced-motion:no-preference){
    article.day{animation:rise .35s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>Astro Daily <span class="scope">Digest</span></h1>
  <span class="sub">X-ray / transients / instruments</span>
</div></header>

<main class="wrap">
  <div class="views" role="tablist" aria-label="表示切り替え">
    <button class="view" id="dailyTab" type="button" role="tab" aria-selected="true">日別</button>
    <button class="view" id="weekTab" type="button" role="tab" aria-selected="false">1週間</button>
  </div>
  <section id="feed" aria-live="polite">
    <p class="note" id="status">読み込み中…</p>
  </section>
</main>

<script>
const PAGE = 7; // 一度に読み込む日数
let dates = [], cursor = 0, mode = 'daily';

async function loadIndex(){
  const st = document.getElementById('status');
  try{
    const res = await fetch('data/index.json', {cache:'no-store'});
    dates = await res.json();
    if(!dates.length){ st.textContent = 'まだ投稿がありません。最初のダイジェストは明朝届きます。'; return; }
    st.remove();
    renderDaily();
  }catch(e){
    st.textContent = 'index.json が読み込めませんでした。Actions が一度実行されるとフィードが生成されます。';
  }
}

async function fetchDigest(date){
  const res = await fetch(`data/${date}.md`, {cache:'no-store'});
  if(!res.ok) throw new Error(date);
  return res.text();
}

function setMode(next){
  mode = next;
  document.getElementById('dailyTab').setAttribute('aria-selected', String(mode === 'daily'));
  document.getElementById('weekTab').setAttribute('aria-selected', String(mode === 'week'));
  if(mode === 'daily') renderDaily();
  else renderWeek();
}

function clearFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  return feed;
}

function renderMath(root){
  if(!window.renderMathInElement) return;
  renderMathInElement(root, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ],
    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    throwOnError: false
  });
}

function enhanceDigest(body){
  for(const h2 of [...body.querySelectorAll('h2')]){
    const text = h2.textContent;
    const section = document.createElement('section');
    section.className = 'digest-section';
    if(text.includes('GCN')) section.classList.add('gcn');
    else if(text.includes('ATel')) section.classList.add('atel');
    else if(text.includes('国内')) section.classList.add('press');
    else if(text.includes('arXiv')) section.classList.add('arxiv');
    h2.parentNode.insertBefore(section, h2);

    let node = h2;
    while(node){
      const next = node.nextSibling;
      if(node !== h2 && node.nodeType === Node.ELEMENT_NODE && node.tagName === 'H2') break;
      section.appendChild(node);
      node = next;
    }

    const note = document.createElement('div');
    note.className = 'section-note';
    if(section.classList.contains('gcn')) note.textContent = 'GCN Circulars / event grouped';
    else if(section.classList.contains('atel')) note.textContent = 'Astronomer’s Telegram / post based';
    else if(section.classList.contains('press')) note.textContent = 'Japan press releases / keyword filtered';
    else if(section.classList.contains('arxiv')) note.textContent = 'arXiv papers / abstract first';
    if(note.textContent) h2.insertAdjacentElement('afterend', note);
  }

  for(const section of body.querySelectorAll('.digest-section')){
    for(const h3 of [...section.querySelectorAll('h3')]){
      const item = document.createElement('section');
      item.className = 'digest-item';
      h3.parentNode.insertBefore(item, h3);
      let node = h3;
      while(node){
        const next = node.nextSibling;
        if(node !== h3 && node.nodeType === Node.ELEMENT_NODE && ['H2','H3','HR'].includes(node.tagName)) break;
        item.appendChild(node);
        node = next;
      }
    }
  }

  for(const p of body.querySelectorAll('p')){
    if(p.textContent.trim().startsWith('原文:')) p.classList.add('source-line');
  }
}

function renderMarkdown(md){
  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = marked.parse(md);
  enhanceDigest(body);
  renderMath(body);
  return body;
}

async function renderDaily(){
  cursor = 0;
  clearFeed();
  await loadMore();
}

async function loadMore(){
  const feed = document.getElementById('feed');
  const slice = dates.slice(cursor, cursor + PAGE);
  cursor += slice.length;
  for(const d of slice){
    try{
      const md = await fetchDigest(d);
      const art = document.createElement('article');
      art.className = 'day';
      art.innerHTML = `<div class="stamp"><span class="date">${d}</span></div>`;
      art.appendChild(renderMarkdown(md));
      feed.appendChild(art);
    }catch(e){ /* 個別の欠損はスキップ */ }
  }
  const old = document.getElementById('more'); if(old) old.remove();
  if(cursor < dates.length){
    const b = document.createElement('button');
    b.id = 'more'; b.className = 'more'; b.textContent = 'さらに過去を読み込む';
    b.onclick = loadMore;
    feed.appendChild(b);
  }
}

async function renderWeek(){
  const feed = clearFeed();
  const week = dates.slice(0, 7);
  const art = document.createElement('article');
  art.className = 'day';
  art.innerHTML = `<div class="stamp week"><span class="date">${week[week.length - 1]} - ${week[0]}</span></div>
                   <div class="body" id="weekBody"></div>`;
  feed.appendChild(art);

  const body = document.getElementById('weekBody');
  for(const d of week){
    try{
      const md = await fetchDigest(d);
      const section = document.createElement('section');
      section.className = 'week-section';
      section.innerHTML = `<div class="week-date">${d}</div>`;
      section.appendChild(renderMarkdown(md));
      body.appendChild(section);
    }catch(e){ /* 個別の欠損はスキップ */ }
  }
}

document.getElementById('dailyTab').addEventListener('click', () => setMode('daily'));
document.getElementById('weekTab').addEventListener('click', () => setMode('week'));
loadIndex();
</script>
</body>
</html>
